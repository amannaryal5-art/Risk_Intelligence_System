{% extends "base.html" %}
{% block content %}
<section class="view-shell">
  <div class="view-header">
    <div>
      <div class="eyebrow">Autonomous Threat Intelligence Command Center</div>
      <h1>Command Center</h1>
    </div>
    <div class="view-actions">
      <button id="refreshCommandView" class="button secondary" type="button">Refresh</button>
      <button id="openCommandPalette" class="button" type="button">Command Palette</button>
    </div>
  </div>

  <div id="commandKpis" class="kpi-grid"></div>

  <div class="dashboard-grid two-up">
    <section class="panel map-panel">
      <div class="panel-header">
        <h2>Threat Landscape</h2>
        <div class="panel-actions">
          <button id="mapTimelineToggle" class="button ghost compact" type="button">Pause Timeline</button>
        </div>
      </div>
      <div id="threatMap" class="map-stage"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Processing Pipeline</h2>
      </div>
      <div id="processingPipeline" class="pipeline-panel"></div>
    </section>
  </div>

  <div class="dashboard-grid two-up">
    <section class="panel">
      <div class="panel-header">
        <h2>Latest High-Confidence Threats</h2>
      </div>
      <div id="highConfidenceThreats" class="table-host"></div>
    </section>
    <section class="panel">
      <div class="panel-header">
        <h2>Autonomous Response Log</h2>
      </div>
      <div id="autonomyLog" class="timeline-feed"></div>
    </section>
  </div>
</section>
{% endblock %}
