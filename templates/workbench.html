{% extends "base.html" %}
{% block content %}
<section class="view-shell">
  <div class="view-header">
    <div>
      <div class="eyebrow">Personal Analyst Dashboard</div>
      <h1>Analyst Workbench</h1>
    </div>
  </div>
  <div id="workbenchStats" class="kpi-grid"></div>
  <div class="dashboard-grid two-up">
    <section class="panel">
      <div class="panel-header"><h2>Assigned Cases</h2></div>
      <div id="assignedCases" class="table-host"></div>
    </section>
    <section class="panel">
      <div class="panel-header"><h2>Team Activity</h2></div>
      <div id="teamActivity" class="timeline-feed"></div>
    </section>
  </div>
  <section class="panel">
    <div class="panel-header"><h2>Watchlist</h2></div>
    <div id="watchlist" class="card-grid"></div>
  </section>
</section>
{% endblock %}
