{% extends "base.html" %}
{% block content %}
<section class="view-shell">
  <div class="view-header">
    <div>
      <div class="eyebrow">Autonomous Lifecycle Oversight</div>
      <h1>Operations Center</h1>
    </div>
    <div class="view-actions">
      <button id="newManualCase" class="button" type="button">New Manual Case</button>
      <button id="exportCases" class="button secondary" type="button">Export CSV</button>
    </div>
  </div>
  <div id="caseFilters" class="pill-row"></div>
  <section class="panel">
    <div class="panel-header">
      <h2>Case Queue</h2>
      <div class="panel-actions">
        <input id="caseSearch" class="shell-input" type="search" placeholder="Search cases">
      </div>
    </div>
    <div id="casesTable" class="table-host"></div>
  </section>
</section>
{% endblock %}
